<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="#0ea5e9"/>
  <!-- Tank body -->
  <rect x="16" y="20" width="32" height="28" rx="4" fill="white" opacity="0.15"/>
  <rect x="16" y="20" width="32" height="28" rx="4" stroke="white" stroke-width="2.5"/>
  <!-- Water fill (70%) -->
  <clipPath id="tank">
    <rect x="16" y="20" width="32" height="28" rx="4"/>
  </clipPath>
  <rect x="16" y="30.4" width="32" height="17.6" fill="white" opacity="0.55" clip-path="url(#tank)"/>
  <!-- Water wave line -->
  <path d="M16 30.4 Q24 27 32 30.4 Q40 33.8 48 30.4" stroke="white" stroke-width="1.5" fill="none" opacity="0.8"/>
  <!-- Level indicator marks -->
  <line x1="50" y1="24" x2="53" y2="24" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="50" y1="30" x2="53" y2="30" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="50" y1="36" x2="53" y2="36" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="50" y1="42" x2="53" y2="42" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Pipe at bottom -->
  <rect x="28" y="47" width="8" height="5" rx="1" fill="white" opacity="0.9"/>
  <!-- Drop icon on water -->
  <path d="M32 22.5 C32 22.5 28.5 26.5 28.5 28.5 C28.5 30.4 30.1 32 32 32 C33.9 32 35.5 30.4 35.5 28.5 C35.5 26.5 32 22.5 32 22.5Z" fill="white" opacity="0.9"/>
</svg>
