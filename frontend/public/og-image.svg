<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c4a6e"/>
      <stop offset="100%" style="stop-color:#0ea5e9"/>
    </linearGradient>
    <linearGradient id="water" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#38bdf8;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#0284c7;stop-opacity:0.9"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="1050" cy="80" r="180" fill="white" opacity="0.04"/>
  <circle cx="1100" cy="550" r="120" fill="white" opacity="0.04"/>
  <circle cx="100" cy="500" r="200" fill="white" opacity="0.03"/>

  <!-- Left panel: Tank illustration -->
  <g transform="translate(80, 120)">
    <!-- Tank outer -->
    <rect x="0" y="0" width="220" height="300" rx="16" fill="white" opacity="0.08" stroke="white" stroke-opacity="0.3" stroke-width="2"/>
    <!-- Water inside -->
    <clipPath id="tankClip">
      <rect x="0" y="0" width="220" height="300" rx="16"/>
    </clipPath>
    <rect x="0" y="100" width="220" height="200" fill="url(#water)" clip-path="url(#tankClip)"/>
    <!-- Wave -->
    <path d="M0 100 Q55 85 110 100 Q165 115 220 100" stroke="white" stroke-width="2" fill="none" opacity="0.9" clip-path="url(#tankClip)"/>
    <!-- Level label -->
    <text x="110" y="180" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="32" font-weight="bold" opacity="0.9">67%</text>
    <text x="110" y="210" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14" opacity="0.7">Water Level</text>
    <!-- Level marks -->
    <line x1="225" y1="20" x2="240" y2="20" stroke="white" stroke-width="2" opacity="0.5"/>
    <line x1="225" y1="100" x2="240" y2="100" stroke="#38bdf8" stroke-width="2"/>
    <line x1="225" y1="180" x2="240" y2="180" stroke="white" stroke-width="2" opacity="0.5"/>
    <line x1="225" y1="260" x2="240" y2="260" stroke="white" stroke-width="2" opacity="0.5"/>
    <!-- Pipe bottom -->
    <rect x="90" y="295" width="40" height="30" rx="4" fill="white" opacity="0.2"/>
    <!-- Status dot -->
    <circle cx="30" cy="30" r="8" fill="#4ade80"/>
    <text x="46" y="35" fill="#4ade80" font-family="Arial, sans-serif" font-size="13">Running</text>
  </g>

  <!-- Right: Text content -->
  <g transform="translate(420, 0)">
    <!-- Logo icon small -->
    <circle cx="50" cy="80" r="32" fill="#0ea5e9" opacity="0.9"/>
    <text x="50" y="87" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="24" font-weight="bold">W</text>

    <!-- Brand name -->
    <text x="100" y="76" fill="white" font-family="Arial, sans-serif" font-size="22" font-weight="600" opacity="0.9">WaterLevel</text>
    <text x="100" y="98" fill="#38bdf8" font-family="Arial, sans-serif" font-size="22" font-weight="700">Recognizer</text>

    <!-- Headline -->
    <text x="0" y="200" fill="white" font-family="Arial, sans-serif" font-size="52" font-weight="800" letter-spacing="-1">Smart Water Motor</text>
    <text x="0" y="265" fill="#38bdf8" font-family="Arial, sans-serif" font-size="52" font-weight="800" letter-spacing="-1">Management System</text>

    <!-- Subtitle -->
    <text x="0" y="320" fill="white" font-family="Arial, sans-serif" font-size="22" opacity="0.7">Monitor · Control · Assign · Track</text>

    <!-- Feature pills -->
    <g transform="translate(0, 360)">
      <rect width="160" height="40" rx="20" fill="white" opacity="0.12"/>
      <text x="80" y="26" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14">🏢 Multi-Center</text>

      <rect x="175" width="160" height="40" rx="20" fill="white" opacity="0.12"/>
      <text x="255" y="26" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14">⚡ Real-time</text>

      <rect x="350" width="160" height="40" rx="20" fill="white" opacity="0.12"/>
      <text x="430" y="26" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14">📊 History Logs</text>
    </g>

    <!-- URL -->
    <text x="0" y="470" fill="white" font-family="Arial, sans-serif" font-size="16" opacity="0.5">water-level-recognizer.vercel.app</text>
  </g>
</svg>
