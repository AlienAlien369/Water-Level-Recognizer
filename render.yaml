services:
  # Backend Web Service (Docker)
  - type: web
    name: wlr-backend
    runtime: docker
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile
    dockerCommand: dotnet WLR.API.dll
    plan: free
    healthCheckPath: /health
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ASPNETCORE_URLS
        value: http://+:8080
      - key: PORT
        value: 8080
      - key: ConnectionStrings__DefaultConnection
        fromDatabase:
          name: wlr-postgres
          property: connectionString
      - key: ConnectionStrings__Redis
        fromService:
          name: wlr-redis
          type: redis
          property: connectionString
      - key: JwtSettings__SecretKey
        generateValue: true
      - key: JwtSettings__Issuer
        value: WaterLevelRecognizer
      - key: JwtSettings__Audience
        value: WLRUsers
      - key: SmsSettings__Provider
        value: Console
      - key: AllowedOrigins__0
        value: https://water-level-recognizer.vercel.app
      - key: AllowedOrigins__1
        value: http://localhost:5173
      - key: ALLOWED_ORIGINS
        sync: false  # Legacy fallback — set to your Vercel URL if needed

  # Redis Cache
  - type: redis
    name: wlr-redis
    plan: free
    ipAllowList: []

databases:
  - name: wlr-postgres
    plan: free
    databaseName: wlr_db
    user: wlr_user
